{% extends "base.html" %}
{% block title %}添加保险 - 研学实践管理系统{% endblock %}
{% block content %}
<div class="form-container">
    <h2>添加出行保险</h2>
    <form method="POST">
        <div class="form-group">
            <label for="registration_id">关联报名</label>
            <select id="registration_id" name="registration_id" required>
                {% for reg in registrations %}
                <option value="{{ reg.id }}">{{ reg.student.name }} - {{ reg.route.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="provider">保险公司</label>
            <input type="text" id="provider" name="provider" required>
        </div>
        <div class="form-group">
            <label for="policy_number">保单号</label>
            <input type="text" id="policy_number" name="policy_number" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="coverage_amount">保额（元）</label>
                <input type="number" id="coverage_amount" name="coverage_amount" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="premium">保费（元）</label>
                <input type="number" id="premium" name="premium" step="0.01" min="0" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">保险起始日期</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>
            <div class="form-group">
                <label for="end_date">保险截止日期</label>
                <input type="date" id="end_date" name="end_date" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">添加保险</button>
        <a href="{{ url_for('insurances.list_insurances') }}" class="btn btn-outline btn-block">取消</a>
    </form>
</div>
{% endblock %}

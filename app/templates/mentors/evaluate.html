{% extends "base.html" %}
{% block title %}考核导师 - 研学实践管理系统{% endblock %}
{% block content %}
<div class="form-container">
    <h2>考核导师 - {{ mentor.name }}</h2>
    <div class="detail-info">
        <div class="detail-row">
            <span class="detail-label">专业方向</span>
            <span>{{ mentor.specialty or '未设置' }}</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">当前评分</span>
            <span>{{ mentor.rating }} / 10</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">考核次数</span>
            <span>{{ mentor.total_evaluations }}</span>
        </div>
    </div>
    <form method="POST">
        <div class="form-group">
            <label for="score">本次评分（0-10）</label>
            <input type="number" id="score" name="score" min="0" max="10" step="0.1" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">提交评分</button>
        <a href="{{ url_for('mentors.mentor_detail', mentor_id=mentor.id) }}" class="btn btn-outline btn-block">取消</a>
    </form>
</div>
{% endblock %}
